<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembayaran Berhasil</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 50px 20px;
            background-color: #F3EDF7;
            color: #1D1B20;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            background: #FFFFFF;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0px 1px 3px rgba(0, 0, 0, 0.12), 0px 1px 2px rgba(0, 0, 0, 0.24);
        }

        h2 {
            color: #6750A4;
            font-size: 24px;
            margin-bottom: 8px;
        }

        p {
            color: #49454F;
            font-size: 14px;
            line-height: 20px;
        }

        .loader {
            border: 4px solid #E7E0EC;
            border-top: 4px solid #6750A4;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 24px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .btn {
            display: inline-block;
            margin-top: 16px;
            padding: 10px 24px;
            background-color: #6750A4;
            color: #FFFFFF;
            text-decoration: none;
            border-radius: 20px;
            font-weight: 500;
            font-size: 14px;
            letter-spacing: 0.1px;
            box-shadow: 0px 1px 2px rgba(0, 0, 0, 0.15);
            transition: background-color 0.2s;
        }

        .btn:active {
            background-color: #4F378B;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Pembayaran Sukses!</h2>

        <a href="intent://deeplink.rumbia.id/sales/entry#Intent;scheme=https;package=com.rumbia.pos;end;" class="btn" id="manual-btn">
            Buka Aplikasi
        </a> 
        
        <br />

     
    </div>

</body>

</html>
